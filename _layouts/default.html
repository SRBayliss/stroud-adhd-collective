<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta charset="UTF-8">
    {% seo %}
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link rel="preload" href="https://fonts.googleapis.com/css?family=Open+Sans:400,700&display=swap" as="style" type="text/css" crossorigin>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#157878">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="stylesheet" href="{{ '/assets/css/style.css?v=' | append: site.github.build_revision }}">
    {% include head.html %}
    <script>
      // Restore saved theme immediately to avoid flash of incorrect theme
      (function () {
        var stored = localStorage.getItem('theme');
        if (stored) {
          document.documentElement.setAttribute('data-theme', stored);
        }
      }());
    </script>
  </head>
  <body>
    <a href="/" class="header-link">
      <header class="page-header" role="banner">
        {% include header.html %}
      </header>
    </a>
    <!-- <nav>
      {% for item in site.data.navigation %}
        <a href="/{{ item.link }}" {% if page.url == item.link %}style="color: red;"{% endif %}>
          {{ item.name }}
        </a>
      {% endfor %}
    </nav> -->
    <main id="content" class="main-content" role="main">
      {{ content }}
      <footer class="site-footer">
        {% include footer.html %}       
      </footer>
    </main>
    <button class="dark-mode-toggle" id="dark-mode-toggle" aria-label="Toggle colour theme">
      🌙
    </button>
    <script>
      (function () {
        var toggle = document.getElementById('dark-mode-toggle');
        var html = document.documentElement;

        function isDarkMode() {
          var theme = html.getAttribute('data-theme');
          if (theme === 'dark') return true;
          if (theme === 'light') return false;
          return window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
        }

        function updateToggle() {
          var dark = isDarkMode();
          toggle.textContent = dark ? '☀️' : '🌙';
          toggle.setAttribute('aria-pressed', dark ? 'true' : 'false');
          toggle.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
        }

        updateToggle();

        toggle.addEventListener('click', function () {
          var dark = isDarkMode();
          var newTheme = dark ? 'light' : 'dark';
          html.setAttribute('data-theme', newTheme);
          localStorage.setItem('theme', newTheme);
          updateToggle();
        });

        if (window.matchMedia) {
          window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function () {
            if (!localStorage.getItem('theme')) {
              updateToggle();
            }
          });
        }
      }());
    </script>
  </body>
</html>
